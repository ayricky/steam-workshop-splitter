<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Splitter</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="/">
            <span class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <rect x="1" y="3" width="3.2" height="18" rx="1" fill="currentColor" opacity=".6"/>
                    <rect x="5.7" y="3" width="3.2" height="18" rx="1" fill="currentColor" opacity=".7"/>
                    <rect x="10.4" y="3" width="3.2" height="18" rx="1" fill="currentColor" opacity=".8"/>
                    <rect x="15.1" y="3" width="3.2" height="18" rx="1" fill="currentColor" opacity=".9"/>
                    <rect x="19.8" y="3" width="3.2" height="18" rx="1" fill="currentColor"/>
                </svg>
            </span>
            WORKSHOP SPLITTER
        </a>
    </div>
</nav>

<div class="wrap">

    <!-- Landing / Upload -->
    <div class="landing" id="landing">
        <div class="hero">
            <div class="hero-panels">
                <div class="hero-panel"></div>
                <div class="hero-panel"></div>
                <div class="hero-panel"></div>
                <div class="hero-panel"></div>
                <div class="hero-panel"></div>
            </div>
            <h2>Video <span>&rarr;</span> 5 animated panels</h2>
            <p>Drop a video or GIF, crop it, split it, upload it to your Steam Workshop Showcase.</p>
        </div>
        <div class="drop" id="drop-zone">
            <input type="file" id="file-input" accept=".gif,.mp4,.webm,.avi,.mov,.mkv,.flv,.wmv" hidden>
            <div id="upload-content">
                <div class="drop-icon">
                    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="6" width="36" height="36" rx="4"/>
                        <path d="M24 30V18"/>
                        <path d="M18 24l6-6 6 6"/>
                    </svg>
                </div>
                <p>Drop a file here, or <span class="link">browse</span></p>
                <small>MP4, WebM, AVI, MOV, MKV, GIF</small>
            </div>
        </div>
    </div>

    <input type="hidden" id="max-size" value="5242880">
    <input type="hidden" id="auto-optimize" value="1">

    <!-- Workspace -->
    <div id="workspace" style="display:none">

        <div class="file-bar">
            <span><strong id="fb-name"></strong> <span class="dim" id="fb-meta"></span></span>
            <button class="link-btn" id="change-file-btn">change</button>
        </div>

        <div class="grid">
            <div class="preview-side">
                <div class="source-editor">
                    <div class="crop-source" id="crop-source">
                        <div id="preview-media"></div>
                        <div class="crop-box" id="crop-box">
                            <div class="crop-edge crop-edge-t" data-edge="top"></div>
                            <div class="crop-edge crop-edge-b" data-edge="bottom"></div>
                            <div class="crop-edge crop-edge-l" data-edge="left"></div>
                            <div class="crop-edge crop-edge-r" data-edge="right"></div>
                        </div>
                    </div>
                    <div class="editor-bar">
                        <small class="dim">Drag to crop &middot; <span id="crop-info">122 x 300</span> per panel</small>
                    </div>
                    <div id="trim-section" style="display:none">
                        <div class="trim-track" id="trim-track">
                            <div class="trim-range" id="trim-range"></div>
                            <div class="trim-handle" id="trim-handle-start"></div>
                            <div class="trim-handle" id="trim-handle-end"></div>
                            <div class="trim-playhead" id="trim-playhead"></div>
                        </div>
                        <div class="trim-labels">
                            <span id="trim-start-label">0.0s</span>
                            <span id="trim-current-label"></span>
                            <span id="trim-end-label">0.0s</span>
                        </div>
                    </div>
                    <div id="trim-section-gif" style="display:none">
                        <div class="inline-fields">
                            <label>Start <input type="number" id="start-time" value="0" min="0" step="0.1"></label>
                            <label>End <input type="number" id="end-time" value="0" min="0" step="0.1"></label>
                        </div>
                    </div>
                </div>
                <div class="canvas-wrap">
                    <canvas id="split-canvas"></canvas>
                </div>
            </div>

            <div class="controls-side">
                <div class="control-group">
                    <div class="inline-fields">
                        <label>Width <input type="number" id="panel-width" value="122" min="50" max="500"></label>
                        <label>Height <input type="number" id="panel-height" value="300" min="50" max="500"></label>
                    </div>
                    <div class="row-between">
                        <small class="dim" id="total-dimensions">610 x 300</small>
                        <button class="link-btn" id="match-ratio-btn">match source ratio</button>
                    </div>
                </div>
                <div class="control-group">
                    <label class="slider-label">FPS <span id="fps-value">15</span></label>
                    <input type="range" id="fps-slider" min="5" max="30" value="15">
                </div>
                <div class="control-group">
                    <label class="slider-label">Colors <span id="colors-value">256</span></label>
                    <input type="range" id="colors-slider" min="16" max="256" value="256" step="8">
                </div>
                <div class="control-group est-group" id="estimate-display"></div>
                <div class="control-group control-group-action">
                    <button class="action-btn" id="process-btn">Split into 5 panels</button>
                </div>
            </div>
        </div>

        <div id="processing-section" style="display:none" class="processing">
            <div class="prog-bar"><div class="prog-fill" id="progress-fill"></div></div>
            <p class="dim" id="progress-text"></p>
            <p class="prog-pct" id="progress-percent">0%</p>
        </div>

        <div id="results-section" style="display:none">
            <div class="result-stats" id="result-stats"></div>
            <div class="result-preview" id="showcase-panels"></div>
            <div class="result-row">
                <button class="action-btn" id="download-all-btn">Download all panels</button>
                <button class="link-btn" id="resync-btn">resync</button>
            </div>
            <div class="upload-section">
                <div class="inline-fields">
                    <label>Title prefix <input type="text" id="title-prefix" value="showcase"></label>
                </div>
                <div class="row-between" style="margin-top:8px">
                    <button class="action-btn action-btn-sm" id="upload-steam-btn">Upload to Steam</button>
                    <small class="dim">opens a browser, you log in, it uploads all 5</small>
                </div>
                <div id="upload-progress" style="display:none;margin-top:10px">
                    <div class="prog-bar"><div class="prog-fill" id="upload-progress-fill"></div></div>
                    <p class="dim" id="upload-step"></p>
                </div>
                <div id="upload-result" style="display:none;margin-top:8px">
                    <p id="upload-result-text"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
